[tox]
isolated_build = True
envlist = stubtest,mypy-plugins

[testenv:stubtest]
runner = uv-venv-runner
deps =
    django>=5.2,<5.3
    django-stubs>=5.2.9
    django-taggit>=6.1
    mypy>=1.19.1
setenv =
    DJANGO_SETTINGS_MODULE = tests.mypy_test_settings
commands =
    python run_stubtest.py modelcluster --allowlist stubtest-allowlist.txt --mypy-config-file mypy.ini

[testenv:mypy-plugins]
runner = uv-venv-runner
deps =
    django>=5.2,<5.3
    django-stubs>=5.2.9
    pytest>=8.0
    pytest-mypy-plugins>=3.0
    mypy>=1.19.1
commands =
    pytest tests/ {posargs}
